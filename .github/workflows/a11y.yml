name: Accessibility Checks

on:
  push:
    branches:
      - main
  pull_request:
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: /${{ github.event.repository.name }}

jobs:
  axe-check:
    defaults:
      run:
        working-directory: ds-102-book
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Install Jupyter Book & Build
      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book

      - name: Build Jupyter Book
        run: jupyter-book build --html

      # 2. Setup Node environment for Axe
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Axe CLI and HTTP Server
        run: npm install -g @axe-core/cli http-server

      # 3. Serve, Discover URLs, and Run Axe
      - name: Run Axe Checks
        run: |
          # A. Create a subdirectory structure that matches the BASE_URL
          mkdir -p staging${BASE_URL}
          cp -r _build/html/* staging${BASE_URL}/
          
          # B. Start a local server in the background
          npx http-server staging -p 8080 -s &
          npx wait-on http://localhost:8080${BASE_URL}/
          
          # C. Generate the URL list from the actual build artifacts
          cd _build/html
          URLS=$(find . -name "*.html" -not -path "*/build/*" | sed 's|^\./||' | sed "s|^|http://localhost:8080${BASE_URL}/|" | tr '\n' ' ')          
          
          # D. Run Axe CLI on the discovered URLs
          axe $URLS \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa \
            --save axe-report.json \
            --exit

      - name: Upload Accessibility Report
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: _build/html/axe-report.json
